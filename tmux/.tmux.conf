# -n mean to bind the key without needing the prefix aka ctrl + b

# Prefix keys
# this lets me use ctrl + space to send commands
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# bind Alt + Shift + hjkl resize
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5

# Start windows at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Move between panes with Ctrl + Alt + Arrow
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Resize panes with Ctrl + Alt + Shift + Arrow
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Down resize-pane -D 5

# bind Alt+Left, Right arrow to cycle window
bind -n M-Left previous-window
bind -n M-Right next-window

# set alt + n for next window
bind -n M-p previous-window
bind -n M-n next-window

# bind Alt + C to create a new window
bind -n M-c new-window -c "#{pane_current_path}"

# bind Alt + hjkl move panes
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U


# jump directly to windows
# "M" stands for meta aka alt key!
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# this sets Alt + v for vertical split and Alt + s for horizontal split
bind -n M-s split-window -v -c "#{pane_current_path}"
bind -n M-v split-window -h -c "#{pane_current_path}"

# set Alt + q to kill a tmux pane
bind -n M-q kill-pane

# set time to 12hr format
set -g status-right "%I:%M %p %d-%b-%y"

# allow mouse support 
set -g mouse on
